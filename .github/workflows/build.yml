name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5

    - name: Build with Gradle
      run: gradle build

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Clearlag-Jar
        path: build/libs/*.jar

    - name: Get Version
      id: get_version
      run: |
        VERSION=$(grep "version =" build.gradle | head -n 1 | cut -d"'" -f2)
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.version }}-build-${{ github.run_number }}
        name: Release v${{ steps.get_version.outputs.version }} (Build #${{ github.run_number }})
        body: "Automated build release for Clearlag v${{ steps.get_version.outputs.version }} (Commit: ${{ github.sha }})."
        draft: false
        prerelease: false
        files: build/libs/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
